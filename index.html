<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plugin Builds</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface-muted: #f1f5f9;
      --border: #e5e7eb;
      --border-strong: #cbd5e1;
      --text: #111827;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-soft: #eff6ff;
      --sans: "Manrope", sans-serif;
      --mono: "JetBrains Mono", monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
    }

    button {
      font: inherit;
    }

    .page {
      max-width: 1440px;
      margin: 0 auto;
      padding: 24px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: var(--accent-soft);
      border: 1px solid #bfdbfe;
      color: var(--accent);
      font: 800 0.95rem var(--mono);
    }

    .brand h1 {
      font-size: 1.9rem;
      line-height: 1;
      margin-bottom: 4px;
    }

    .brand p {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .shell {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 18px;
      min-height: calc(100vh - 128px);
    }

    .sidebar,
    .detail {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--surface);
    }

    .sidebar {
      padding: 18px;
    }

    .detail {
      padding: 22px;
    }

    .sidebar-head {
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-head h2 {
      font-size: 1rem;
      margin-bottom: 4px;
    }

    .sidebar-head p {
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.55;
    }

    .group + .group {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }

    .group-label {
      margin-bottom: 10px;
      color: var(--muted);
      font: 700 0.68rem var(--mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .tree {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .tree-btn {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid transparent;
      border-radius: 12px;
      background: transparent;
      color: var(--text);
      text-align: left;
      cursor: pointer;
    }

    .tree-btn:hover {
      background: var(--surface-muted);
      border-color: var(--border);
    }

    .tree-btn.active {
      background: var(--accent-soft);
      border-color: #bfdbfe;
      color: var(--accent);
    }

    .tree-btn strong {
      display: block;
      font-size: 0.92rem;
      margin-bottom: 4px;
    }

    .tree-btn span {
      color: var(--muted);
      font-size: 0.77rem;
    }

    .tree-empty {
      padding: 10px 12px;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.6;
      border: 1px dashed var(--border);
      border-radius: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 42px;
      padding: 0 15px;
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      text-decoration: none;
      font-weight: 700;
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .crumbs {
      margin-bottom: 18px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .crumbs strong {
      color: var(--text);
    }

    .plugin-head {
      padding-bottom: 18px;
      margin-bottom: 18px;
      border-bottom: 1px solid var(--border);
    }

    .plugin-head h2 {
      font-size: 1.7rem;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .plugin-meta {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      font: 700 0.68rem var(--mono);
      background: var(--surface-muted);
    }

    .release-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .release {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #ffffff;
    }

    .release.latest {
      border-color: #bfdbfe;
      background: #f8fbff;
    }

    .release-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .release-top strong {
      display: block;
      font-size: 1rem;
      margin-bottom: 4px;
    }

    .release-top span {
      color: var(--muted);
      font: 700 0.72rem var(--mono);
    }

    .badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      font: 700 0.66rem var(--mono);
      background: #ffffff;
    }

    .badge.latest {
      color: var(--accent);
      border-color: #bfdbfe;
      background: var(--accent-soft);
    }

    .empty-state {
      padding: 18px;
      border: 1px dashed var(--border);
      border-radius: 14px;
      color: var(--muted);
      line-height: 1.7;
    }

    @media (max-width: 1100px) {
      .shell {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .page {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="brand">
        <div class="brand-mark">SB</div>
        <div>
          <h1 id="pageTitle">Plugin Builds</h1>
          <p>Browse Core and Addons releases like a file explorer.</p>
        </div>
      </div>
      <div class="toolbar">
        <a href="admin.html" class="btn">Admin</a>
        <button id="refreshBtn" class="btn" type="button">Refresh</button>
      </div>
    </header>

    <div class="shell">
      <aside class="sidebar">
        <div class="sidebar-head">
          <h2>Explorer</h2>
          <p>Select Core or Addons, then open a plugin to view its releases.</p>
        </div>

        <div class="group">
          <div class="group-label">Type</div>
          <div class="tree">
            <button id="rootCoreBtn" class="tree-btn" type="button">
              <strong>Core</strong>
              <span id="coreCount">0 plugins</span>
            </button>
            <button id="rootAddonsBtn" class="tree-btn" type="button">
              <strong>Addons</strong>
              <span id="addonsCount">0 sections</span>
            </button>
          </div>
        </div>

        <div id="sectionGroup" class="group">
          <div class="group-label">Plugin Sections</div>
          <div id="sectionList" class="tree"></div>
        </div>

        <div class="group">
          <div class="group-label">Plugins</div>
          <div id="pluginList" class="tree"></div>
        </div>
      </aside>

      <main class="detail">
        <div id="crumbs" class="crumbs"></div>
        <div id="contentBody"></div>
      </main>
    </div>
  </div>

  <script>
    let catalogData = createEmptyCatalog();
    let selectedRoot = "core";
    let selectedSectionIndex = -1;
    let selectedPluginIndex = -1;

    document.getElementById("rootCoreBtn").addEventListener("click", () => selectRoot("core"));
    document.getElementById("rootAddonsBtn").addEventListener("click", () => selectRoot("addons"));
    document.getElementById("refreshBtn").addEventListener("click", loadCatalog);

    function createEmptyCatalog() {
      return {
        catalog: {
          title: "Plugin Catalog",
          core: { plugins: [] },
          addons: { sections: [] },
        },
      };
    }

    function stringValue(value) {
      return typeof value === "string" ? value.trim() : "";
    }

    function normalizeRelease(release) {
      return {
        name: stringValue(release.name),
        version: stringValue(release.version),
        type: stringValue(release.type) || "stable",
        latest: Boolean(release.latest),
        status: stringValue(release.status) || "success",
        loader: stringValue(release.loader) || "PaperMC",
        download: stringValue(release.download),
      };
    }

    function normalizePlugin(plugin) {
      return {
        name: stringValue(plugin.name),
        releases: Array.isArray(plugin.releases) ? plugin.releases.map(normalizeRelease) : [],
      };
    }

    function normalizeCatalog(input) {
      const catalog = input?.catalog || {};
      return {
        catalog: {
          title: stringValue(catalog.title) || "Plugin Catalog",
          core: {
            plugins: Array.isArray(catalog.core?.plugins) ? catalog.core.plugins.map(normalizePlugin) : [],
          },
          addons: {
            sections: Array.isArray(catalog.addons?.sections) ? catalog.addons.sections.map((section) => ({
              name: stringValue(section.name),
              plugins: Array.isArray(section.plugins) ? section.plugins.map(normalizePlugin) : [],
            })) : [],
          },
        },
      };
    }

    function currentSection() {
      if (selectedRoot !== "addons" || selectedSectionIndex < 0) return null;
      return catalogData.catalog.addons.sections[selectedSectionIndex] || null;
    }

    function currentPlugins() {
      if (selectedRoot === "core") return catalogData.catalog.core.plugins;
      return currentSection()?.plugins || [];
    }

    function currentPlugin() {
      if (selectedPluginIndex < 0) return null;
      return currentPlugins()[selectedPluginIndex] || null;
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    function toSafeExternalUrl(value) {
      try {
        const url = new URL(value);
        return url.protocol === "https:" ? url.toString() : "";
      } catch {
        return "";
      }
    }

    function clampSelection() {
      if (selectedRoot === "core") {
        selectedSectionIndex = -1;
        const plugins = catalogData.catalog.core.plugins;
        if (plugins.length === 0) {
          selectedPluginIndex = -1;
          return;
        }
        if (selectedPluginIndex >= plugins.length) selectedPluginIndex = plugins.length - 1;
        return;
      }

      const sections = catalogData.catalog.addons.sections;
      if (sections.length === 0) {
        selectedSectionIndex = -1;
        selectedPluginIndex = -1;
        return;
      }
      if (selectedSectionIndex < 0) selectedSectionIndex = 0;
      if (selectedSectionIndex >= sections.length) selectedSectionIndex = sections.length - 1;
      const plugins = currentPlugins();
      if (plugins.length === 0) {
        selectedPluginIndex = -1;
        return;
      }
      if (selectedPluginIndex >= plugins.length) selectedPluginIndex = plugins.length - 1;
    }

    function selectRoot(root) {
      selectedRoot = root;
      selectedPluginIndex = -1;
      if (root === "core") {
        selectedSectionIndex = -1;
      } else if (catalogData.catalog.addons.sections.length > 0) {
        selectedSectionIndex = Math.max(0, Math.min(selectedSectionIndex, catalogData.catalog.addons.sections.length - 1));
      }
      renderAll();
    }

    function selectSection(index) {
      selectedRoot = "addons";
      selectedSectionIndex = index;
      selectedPluginIndex = -1;
      renderAll();
    }

    function selectPlugin(index) {
      selectedPluginIndex = index;
      renderAll();
    }

    async function loadCatalog() {
      try {
        const response = await fetch("/.netlify/functions/api");
        if (!response.ok) throw new Error(`API error: ${response.status}`);
        catalogData = normalizeCatalog(await response.json());
        clampSelection();
        renderAll();
      } catch (error) {
        document.getElementById("contentBody").innerHTML = `<div class="empty-state">Failed to load catalog: ${escapeHtml(error.message)}</div>`;
      }
    }

    function renderAll() {
      clampSelection();
      document.getElementById("pageTitle").textContent = catalogData.catalog.title;
      document.getElementById("coreCount").textContent = `${catalogData.catalog.core.plugins.length} plugins`;
      document.getElementById("addonsCount").textContent = `${catalogData.catalog.addons.sections.length} sections`;
      document.getElementById("rootCoreBtn").classList.toggle("active", selectedRoot === "core");
      document.getElementById("rootAddonsBtn").classList.toggle("active", selectedRoot === "addons");
      renderSections();
      renderPlugins();
      renderContent();
    }

    function renderSections() {
      const group = document.getElementById("sectionGroup");
      const list = document.getElementById("sectionList");

      if (selectedRoot !== "addons") {
        group.style.display = "none";
        return;
      }

      group.style.display = "block";
      const sections = catalogData.catalog.addons.sections;
      if (!sections.length) {
        list.innerHTML = '<div class="tree-empty">No plugin sections yet.</div>';
        return;
      }

      list.innerHTML = sections.map((section, index) => `
        <button class="tree-btn ${index === selectedSectionIndex ? "active" : ""}" type="button" data-index="${index}">
          <strong>${escapeHtml(section.name)}</strong>
          <span>${section.plugins.length} plugins</span>
        </button>
      `).join("");

      list.querySelectorAll("[data-index]").forEach((button) => {
        button.addEventListener("click", () => selectSection(Number(button.dataset.index)));
      });
    }

    function renderPlugins() {
      const list = document.getElementById("pluginList");
      const plugins = currentPlugins();

      if (selectedRoot === "addons" && !currentSection()) {
        list.innerHTML = '<div class="tree-empty">Select a plugin section first.</div>';
        return;
      }

      if (!plugins.length) {
        list.innerHTML = '<div class="tree-empty">No plugins here yet.</div>';
        return;
      }

      list.innerHTML = plugins.map((plugin, index) => {
        const latest = plugin.releases.find((release) => release.latest) || plugin.releases[0];
        const suffix = latest ? ` · latest ${escapeHtml(latest.version)}` : "";
        return `
          <button class="tree-btn ${index === selectedPluginIndex ? "active" : ""}" type="button" data-index="${index}">
            <strong>${escapeHtml(plugin.name)}</strong>
            <span>${plugin.releases.length} releases${suffix}</span>
          </button>
        `;
      }).join("");

      list.querySelectorAll("[data-index]").forEach((button) => {
        button.addEventListener("click", () => selectPlugin(Number(button.dataset.index)));
      });
    }

    function renderContent() {
      const content = document.getElementById("contentBody");
      const plugin = currentPlugin();
      const section = currentSection();
      const parts = [`Type: <strong>${selectedRoot === "core" ? "Core" : "Addons"}</strong>`];
      if (selectedRoot === "addons") {
        parts.push(`Section: <strong>${escapeHtml(section?.name || "-")}</strong>`);
      }
      parts.push(`Plugin: <strong>${escapeHtml(plugin?.name || "-")}</strong>`);
      document.getElementById("crumbs").innerHTML = parts.join(" &nbsp;/&nbsp; ");

      if (selectedRoot === "addons" && !section) {
        content.innerHTML = '<div class="empty-state">Select a plugin section from the left to browse Addons plugins.</div>';
        return;
      }

      if (!plugin) {
        content.innerHTML = '<div class="empty-state">Select a plugin from the left to view its releases.</div>';
        return;
      }

      content.innerHTML = `
        <div class="plugin-head">
          <h2>${escapeHtml(plugin.name)}</h2>
          <div class="plugin-meta">${plugin.releases.length} releases</div>
        </div>
        <div class="release-list">
          ${plugin.releases.length ? plugin.releases.map(renderRelease).join("") : '<div class="empty-state">No releases for this plugin yet.</div>'}
        </div>
      `;
    }

    function renderRelease(release) {
      const safeUrl = toSafeExternalUrl(release.download);
      return `
        <article class="release ${release.latest ? "latest" : ""}">
          <div class="release-top">
            <div>
              <strong>${escapeHtml(release.name || release.version)}</strong>
              <span>v${escapeHtml(release.version)}</span>
            </div>
            <div class="badges">
              ${release.latest ? '<span class="badge latest">latest</span>' : ""}
              <span class="badge">${escapeHtml(release.type)}</span>
              <span class="badge">${escapeHtml(release.status)}</span>
              <span class="badge">${escapeHtml(release.loader)}</span>
            </div>
          </div>
          ${safeUrl ? `<a href="${escapeAttr(safeUrl)}" target="_blank" rel="noopener" class="btn">Download</a>` : '<div class="empty-state">Download unavailable.</div>'}
        </article>
      `;
    }

    loadCatalog();
  </script>
</body>
</html>
